blueprint:
  name: Keypad 3 Botões - Cenas, Ar e Cortina
  description: Controla 3 sensores de pulso com funções de clique curto e longo (1 segundo).
  domain: automation
  input:
    # --- BOTÃO 1 ---
    button_1:
      name: Botão 1 (Cenas)
      description: Entidade do binary_sensor do botão 1.
      selector:
        entity:
          domain: binary_sensor
    counter_helper:
      name: Variável do Contador de Cenas
      description: O Ajudante (input_number) de 0 a 3 que você criou.
      selector:
        entity:
          domain: input_number
    scene_1:
      name: Cena 1
      selector: { entity: { domain: scene } }
    scene_2:
      name: Cena 2
      selector: { entity: { domain: scene } }
    scene_3:
      name: Cena 3
      selector: { entity: { domain: scene } }
    scene_off:
      name: Cena Padrão / Desligar
      selector: { entity: { domain: scene } }

    # --- BOTÃO 2 ---
    button_2:
      name: Botão 2 (Ar Condicionado)
      description: Entidade do binary_sensor do botão 2.
      selector:
        entity:
          domain: binary_sensor
    action_ac_off:
      name: Botão 2 - Clique Curto (Desligar Ar)
      description: Ação executada com um clique rápido.
      selector: { action: {} }
    action_ac_on:
      name: Botão 2 - Clique Longo (Ligar Ar)
      description: Ação executada ao segurar por 1 segundo.
      selector: { action: {} }

    # --- BOTÃO 3 ---
    button_3:
      name: Botão 3 (Cortina)
      description: Entidade do binary_sensor do botão 3.
      selector:
        entity:
          domain: binary_sensor
    cover_entity:
      name: Cortina
      selector: { entity: { domain: cover } }
    action_all_off:
      name: Botão 3 - Clique Longo (Desligar Ambiente)
      description: Ações para desligar iluminação e equipamentos.
      selector: { action: {} }

mode: parallel
max: 3

variables:
  counter_var: !input counter_helper

trigger:
  - platform: state
    entity_id: !input button_1
    from: 'off'
    to: 'on'
    id: 'btn1'
  - platform: state
    entity_id: !input button_2
    from: 'off'
    to: 'on'
    id: 'btn2'
  - platform: state
    entity_id: !input button_3
    from: 'off'
    to: 'on'
    id: 'btn3'

action:
  - choose:
      # =================================================
      # LÓGICA BOTÃO 1 - CENAS
      # =================================================
      - conditions:
          - condition: trigger
            id: 'btn1'
        sequence:
          # Aguarda para ver se o botão foi solto antes de 1 segundo
          - wait_for_trigger:
              - platform: state
                entity_id: !input button_1
                to: 'off'
            timeout: '00:00:01'
          - choose:
              # HOLD (> 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input scene_off
                  - service: input_number.set_value
                    target:
                      entity_id: !input counter_helper
                    data:
                      value: 0
              # CLICK CURTO (< 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger != none }}"
                sequence:
                  # Lógica de incremento do contador (0 -> 1 -> 2 -> 3 -> 0)
                  - service: input_number.set_value
                    target:
                      entity_id: !input counter_helper
                    data:
                      value: >
                        {% set current = states(counter_var) | float(0) %}
                        {% if current >= 3 %}
                          0
                        {% else %}
                          {{ current + 1 }}
                        {% endif %}
                  - delay: "00:00:00.2" # Aguarda atualização do estado no HA
                  - choose:
                      - conditions: "{{ is_state(counter_var, '1.0') or is_state(counter_var, '1') }}"
                        sequence:
                          - service: scene.turn_on
                            target:
                              entity_id: !input scene_1
                      - conditions: "{{ is_state(counter_var, '2.0') or is_state(counter_var, '2') }}"
                        sequence:
                          - service: scene.turn_on
                            target:
                              entity_id: !input scene_2
                      - conditions: "{{ is_state(counter_var, '3.0') or is_state(counter_var, '3') }}"
                        sequence:
                          - service: scene.turn_on
                            target:
                              entity_id: !input scene_3
                    default:
                      - service: scene.turn_on
                        target:
                          entity_id: !input scene_off

      # =================================================
      # LÓGICA BOTÃO 2 - AR CONDICIONADO
      # =================================================
      - conditions:
          - condition: trigger
            id: 'btn2'
        sequence:
          - wait_for_trigger:
              - platform: state
                entity_id: !input button_2
                to: 'off'
            timeout: '00:00:01'
          - choose:
              # HOLD (> 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                sequence: !input action_ac_on
              # CLICK CURTO (< 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger != none }}"
                sequence: !input action_ac_off

      # =================================================
      # LÓGICA BOTÃO 3 - CORTINA E GERAL
      # =================================================
      - conditions:
          - condition: trigger
            id: 'btn3'
        sequence:
          - wait_for_trigger:
              - platform: state
                entity_id: !input button_3
                to: 'off'
            timeout: '00:00:01'
          - choose:
              # HOLD (> 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                sequence: !input action_all_off
              # CLICK CURTO (< 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger != none }}"
                sequence:
                  - service: cover.toggle
                    target:
                      entity_id: !input cover_entity