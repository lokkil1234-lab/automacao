blueprint:
  name: Keypad 3 Botões - Cenas, Ar e Cortina
  description: Controla 3 sensores de pulso com funções de clique curto e longo (1 segundo).
  domain: automation
  input:
    # --- BOTÃO 1 ---
    button_1:
      name: Botão 1 (Cenas)
      description: Entidade do binary_sensor do botão 1.
      selector:
        entity:
          domain: binary_sensor
    counter_helper:
      name: Variável do Contador de Cenas
      description: O Ajudante (input_number) de 0 a 3 que você criou.
      selector:
        entity:
          domain: input_number
    scene_1:
      name: Cena 1
      selector: { entity: { domain: scene } }
    scene_2:
      name: Cena 2
      selector: { entity: { domain: scene } }
    scene_3:
      name: Cena 3
      selector: { entity: { domain: scene } }
    scene_off:
      name: Cena Padrão / Desligar
      selector: { entity: { domain: scene } }

    # --- BOTÃO 2 ---
    button_2:
      name: Botão 2 (Ar Condicionado)
      description: Entidade do binary_sensor do botão 2.
      selector:
        entity:
          domain: binary_sensor
    action_ac_off:
      name: Botão 2 - Clique Curto (Desligar Ar)
      description: Ação executada com um clique rápido.
      selector: { action: {} }
    action_ac_on:
      name: Botão 2 - Clique Longo (Ligar Ar)
      description: Ação executada ao segurar por 1 segundo.
      selector: { action: {} }

    # --- BOTÃO 3 ---
    button_3:
      name: Botão 3 (Cortina)
      description: Entidade do binary_sensor do botão 3.
      selector:
        entity:
          domain: binary_sensor
    cover_entity:
      name: Cortina
      selector: { entity: { domain: cover } }
    action_all_off:
      name: Botão 3 - Clique Longo (Desligar Ambiente)
      description: Ações para desligar iluminação e equipamentos.
      selector: { action: {} }

mode: parallel


variables:
  counter_var: !input counter_helper

trigger:
  # Gatilho duplo: Dispara quando aperta E quando solta
  - platform: state
    entity_id: !input button_1
    id: "btn_changed"
    
  - platform: state
    entity_id: !input button_2
    from: 'off'
    to: 'on'
    id: 'btn2'
  - platform: state
    entity_id: !input button_3
    from: 'off'
    to: 'on'
    id: 'btn3'

action:
  - if:
      # --- MOMENTO 1: O BOTÃO FOI APERTADO (ON) ---
      - condition: template
        value_template: "{{ trigger.to_state.state == 'on' }}"
    then:
      # Não faz nada, apenas "acorda" a automação e espera o próximo evento
      - stop: "Aguardando soltar o botão"

  - if:
      # --- MOMENTO 2: O BOTÃO FOI SOLTO (OFF) ---
      - condition: template
        value_template: "{{ trigger.to_state.state == 'off' }}"
    then:
      - variables:
          # Calcula quanto tempo o botão ficou apertado (em segundos)
          duracao: "{{ (as_timestamp(now()) - as_timestamp(trigger.from_state.last_changed)) }}"

      - choose:
          # CLICK CURTO (Ex: menos de 0.6 segundos)
          - conditions: "{{ duracao < 0.6 }}"
            sequence:
              - service: input_number.set_value
                target: { entity_id: !input counter_helper }
                data:
                  value: >
                    {% set current = states(counter_var) | float(0) %}
                    {{ 0 if current >= 3 else current + 1 }}
              - delay: "00:00:00.05"
              - choose:
                  - conditions: "{{ is_state(counter_var, '1.0') or is_state(counter_var, '1') }}"
                    sequence: [{service: scene.turn_on, target: {entity_id: !input scene_1}}]
                  - conditions: "{{ is_state(counter_var, '2.0') or is_state(counter_var, '2') }}"
                    sequence: [{service: scene.turn_on, target: {entity_id: !input scene_2}}]
                  - conditions: "{{ is_state(counter_var, '3.0') or is_state(counter_var, '3') }}"
                    sequence: [{service: scene.turn_on, target: {entity_id: !input scene_3}}]
                default:
                  - service: scene.turn_on
                    target: {entity_id: !input scene_off}

          # CLICK LONGO (Ex: mais de 0.6 segundos)
          - conditions: "{{ duracao >= 0.6 }}"
            sequence:
              - service: scene.turn_on
                target: { entity_id: !input scene_off }
              - service: input_number.set_value
                target: { entity_id: !input counter_helper }
                data: { value: 0 }

      # =================================================
      # LÓGICA BOTÃO 2 - AR CONDICIONADO
      # =================================================
      - conditions:
          - condition: trigger
            id: 'btn2'
        sequence:
          - wait_for_trigger:
              - platform: state
                entity_id: !input button_2
                to: 'off'
            timeout: '00:00:01'
          - choose:
              # HOLD (> 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                sequence: !input action_ac_on
              # CLICK CURTO (< 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger != none }}"
                sequence: !input action_ac_off

      # =================================================
      # LÓGICA BOTÃO 3 - CORTINA E GERAL
      # =================================================
      - conditions:
          - condition: trigger
            id: 'btn3'
        sequence:
          - wait_for_trigger:
              - platform: state
                entity_id: !input button_3
                to: 'off'
            timeout: '00:00:01'
          - choose:
              # HOLD (> 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                sequence: !input action_all_off
              # CLICK CURTO (< 1s)
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger != none }}"
                sequence:
                  - service: cover.toggle
                    target:
                      entity_id: !input cover_entity