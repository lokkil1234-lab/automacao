blueprint:
  name: "Botão de Cenas Pro - Single"
  description: "Controle de ciclos de cenas para 1 botão físico (ESP)."
  domain: automation
  input:
    button_entity:
      name: Sensor do Botão
      description: "Selecione o binary_sensor do seu ESP (Ex: Botão 1)."
      selector:
        entity:
          domain: binary_sensor
    counter_helper:
      name: Ajudante de Contador
      description: "O input_number criado para contar as cenas (0 a 3)."
      selector:
        entity:
          domain: input_number
    scene_1:
      name: Cena 1
      selector: { entity: { domain: scene } }
    scene_2:
      name: Cena 2
      selector: { entity: { domain: scene } }
    scene_3:
      name: Cena 3
      selector: { entity: { domain: scene } }
    scene_off:
      name: Cena Desligar TUDO
      description: "Acionada no Clique Longo ou após a última cena."
      selector: { entity: { domain: scene } }

mode: parallel
max: 10

trigger:
  - platform: state
    entity_id: !input button_entity

action:
  - choose:
      # MOMENTO 1: APERTOU (ON) -> APENAS PARA E ESPERA
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'on' }}"
        sequence:
          - stop: "Aguardando o dedo soltar"

      # MOMENTO 2: SOLTOU (OFF) -> CALCULA E EXECUTA
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'off' }}"
        sequence:
          - variables:
              duracao: "{{ as_timestamp(now()) - as_timestamp(trigger.from_state.last_changed) }}"
              contador: !input counter_helper

          - choose:
              # --- CLIQUE CURTO (TROCA DE CENA) ---
              - conditions: "{{ duracao < 0.6 }}"
                sequence:
                  - service: input_number.set_value
                    target: { entity_id: !input counter_helper }
                    data:
                      value: >
                        {% set atual = states(contador) | float(0) %}
                        {{ 0 if atual >= 3 else atual + 1 }}
                  - delay: "00:00:00.05"
                  - choose:
                      - conditions: "{{ is_state(contador, '1.0') }}"
                        sequence: [{ service: scene.turn_on, target: { entity_id: !input scene_1 } }]
                      - conditions: "{{ is_state(contador, '2.0') }}"
                        sequence: [{ service: scene.turn_on, target: { entity_id: !input scene_2 } }]
                      - conditions: "{{ is_state(contador, '3.0') }}"
                        sequence: [{ service: scene.turn_on, target: { entity_id: !input scene_3 } }]
                    default:
                      - service: scene.turn_on
                        target: { entity_id: !input scene_off }

              # --- CLIQUE LONGO (DESLIGAR) ---
              - conditions: "{{ duracao >= 0.6 }}"
                sequence:
                  - service: scene.turn_on
                    target: { entity_id: !input scene_off }
                  - service: input_number.set_value
                    target: { entity_id: !input counter_helper }
                    data: { value: 0 }
