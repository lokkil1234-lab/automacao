blueprint:
  name: "Conversor ESPHome Multi-Click para Cenas"
  description: "Tradução do código on_multi_click para Blueprint (Clique Curto cicla cenas, Longo desliga)"
  domain: automation
  input:
    button_entity:
      name: Botão do ESP
      selector: { entity: { domain: binary_sensor } }
    counter_helper:
      name: Ajudante de Contador (input_number)
      description: "Crie um ajudante de 0 a 3 para este botão."
      selector: { entity: { domain: input_number } }
    scene_1:
      name: Cena 1 (Case 1)
      selector: { entity: { domain: scene } }
    scene_2:
      name: Cena 2 (Case 2)
      selector: { entity: { domain: scene } }
    scene_3:
      name: Cena 3 (Case 3)
      selector: { entity: { domain: scene } }
    scene_off:
      name: Cena Desligar (Default / Long Click)
      selector: { entity: { domain: scene } }

mode: parallel # Permite que o cálculo de tempo funcione sem travar

trigger:
  - platform: state
    entity_id: !input button_entity

action:
  - choose:
      # --- EQUIVALENTE AO "ON" (Início do clique) ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'on' }}"
        sequence:
          - stop: "Aguardando soltar para calcular timing"

      # --- EQUIVALENTE AO "OFF" (Onde o 'then' do timing acontece) ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'off' }}"
        sequence:
          - variables:
              # Calcula a duração (ON time)
              duracao: "{{ as_timestamp(now()) - as_timestamp(trigger.from_state.last_changed) }}"
              contador: !input counter_helper

          - choose:
              # CLIQUE CURTO (ON for at most 0.9s)
              - conditions: "{{ duracao < 0.9 }}"
                sequence:
                  # id(controle_keypad_01) += 1;
                  - service: input_number.set_value
                    target: { entity_id: !input counter_helper }
                    data:
                      value: >
                        {% set atual = states(contador) | float(0) %}
                        {{ 0 if atual >= 3 else atual + 1 }}
                  
                  - delay: "00:00:00.05" # Pequeno tempo para o contador atualizar
                  
                  # switch (id(controle_keypad_01))
                  - choose:
                      - conditions: "{{ is_state(contador, '1.0') }}"
                        sequence: [{ service: scene.turn_on, target: { entity_id: !input scene_1 } }]
                      - conditions: "{{ is_state(contador, '2.0') }}"
                        sequence: [{ service: scene.turn_on, target: { entity_id: !input scene_2 } }]
                      - conditions: "{{ is_state(contador, '3.0') }}"
                        sequence: [{ service: scene.turn_on, target: { entity_id: !input scene_3 } }]
                    default:
                      # case default: id(home_iluminacao_off).execute(); id(controle_keypad_01) = 0;
                      - service: scene.turn_on
                        target: { entity_id: !input scene_off }
                      - service: input_number.set_value
                        target: { entity_id: !input counter_helper }
                        data: { value: 0 }

              # CLIQUE LONGO (ON for at least 1s)
              - conditions: "{{ duracao >= 1.0 }}"
                sequence:
                  # id(controle_keypad_01) = 0; script.execute: home_iluminacao_off
                  - service: scene.turn_on
                    target: { entity_id: !input scene_off }
                  - service: input_number.set_value
                    target: { entity_id: !input counter_helper }
                    data: { value: 0 }