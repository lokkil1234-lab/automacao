blueprint:
  name: "Keypad Event-Based - Final"
  description: "Acionamento ultra-rápido baseado no evento esphome.esp_click_event"
  domain: automation
  input:
    button_id_input:
      name: botao_1
      description: "Escreva exatamente: botao_1"
      default: "botao_1"
    counter_helper:
      name: Ajudante de Contador
      selector: { entity: { domain: input_number } }
    scene_1:
      name: Cena 1
      selector: { entity: { domain: scene } }
    scene_2:
      name: Cena 2
      selector: { entity: { domain: scene } }
    scene_3:
      name: Cena 3
      selector: { entity: { domain: scene } }
    scene_off:
      name: Cena Desligar
      selector: { entity: { domain: scene } }

trigger:
  - platform: event
    event_type: esphome.esp_click_event

action:
  # Filtro de Segurança: Só executa se o botão no evento for o mesmo desta automação
  - condition: template
    value_template: "{{ trigger.event.data.button == input.button_id_input }}"

  - choose:
      # --- LÓGICA CLIQUE CURTO ---
      - conditions: "{{ trigger.event.data.type == 'curto' }}"
        sequence:
          - service: input_number.set_value
            target: { entity_id: !input counter_helper }
            data:
              value: >
                {% set contador = states(input.counter_helper) | float(0) %}
                {{ 0 if contador >= 3 else contador + 1 }}
          
          - delay: "00:00:00.05"
          
          - choose:
              - conditions: "{{ is_state(input.counter_helper, '1.0') }}"
                sequence: [{service: scene.turn_on, target: {entity_id: !input scene_1}}]
              - conditions: "{{ is_state(input.counter_helper, '2.0') }}"
                sequence: [{service: scene.turn_on, target: {entity_id: !input scene_2}}]
              - conditions: "{{ is_state(input.counter_helper, '3.0') }}"
                sequence: [{service: scene.turn_on, target: {entity_id: !input scene_3}}]
            default:
              - service: scene.turn_on
                target: {entity_id: !input scene_off}

      # --- LÓGICA CLIQUE LONGO ---
      - conditions: "{{ trigger.event.data.type == 'longo' }}"
        sequence:
          - service: scene.turn_on
            target: {entity_id: !input scene_off}
          - service: input_number.set_value
            target: {entity_id: !input counter_helper }
            data: {value: 0}
