blueprint:
  name: "Botão Cenas"
  description: "Usa eventos nativos do ESPHome para acionamento instantâneo."
  domain: automation
  input:
    # Não usamos mais entidade, usamos o ID que definimos no ESP
    button_id:
      name: ID do Botão
      description: "O nome do botão definido no ESP (ex: botao_1)"
      default: "botao_1"
    counter_helper:
      name: Ajudante de Contador
      selector: { entity: { domain: input_number } }
    scene_1:
      name: Cena 1
      selector: { entity: { domain: scene } }
    scene_2:
      name: Cena 2
      selector: { entity: { domain: scene } }
    scene_3:
      name: Cena 3
      selector: { entity: { domain: scene } }
    scene_off:
      name: Cena Desligar
      selector: { entity: { domain: scene } }

trigger:
  - platform: event
    event_type: esphome.esp_click_event # O mesmo nome que corrigimos acima

action:
  - variables:
      button_pressed: "{{ trigger.event.data.button }}"
      click_type: "{{ trigger.event.data.type }}"
      counter_entity: !input counter_helper

  # Só continua se o evento for do botão que esta automação controla
  - condition: template
    value_template: "{{ button_pressed == input.button_id }}"

  - choose:
      # LÓGICA CLIQUE CURTO
      - conditions: "{{ click_type == 'curto' }}"
        sequence:
          - service: input_number.set_value
            target: { entity_id: !input counter_helper }
            data:
              value: >
                {% set current = states(counter_entity) | float(0) %}
                {{ 0 if current >= 3 else current + 1 }}
          - delay: "00:00:00.02"
          - choose:
              - conditions: "{{ is_state(counter_entity, '1.0') }}"
                sequence: [{service: scene.turn_on, target: {entity_id: !input scene_1}}]
              - conditions: "{{ is_state(counter_entity, '2.0') }}"
                sequence: [{service: scene.turn_on, target: {entity_id: !input scene_2}}]
              - conditions: "{{ is_state(counter_entity, '3.0') }}"
                sequence: [{service: scene.turn_on, target: {entity_id: !input scene_3}}]
            default:
              - service: scene.turn_on
                target: {entity_id: !input scene_off}

      # LÓGICA CLIQUE LONGO
      - conditions: "{{ click_type == 'longo' }}"
        sequence:
          - service: scene.turn_on
            target: {entity_id: !input scene_off}
          - service: input_number.set_value
            target: {entity_id: !input counter_helper}
            data: {value: 0}